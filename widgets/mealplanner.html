<!-- Mealplanner Widget Set v1.1.0 -->

<script type="text/javascript">
(function ($) {
    'use strict';

    if (typeof vis === 'undefined') return;

    vis.binds['mealplanner'] = {
        version: '1.1.0',
        showVersion: function() {
            if (vis.binds['mealplanner'].version) {
                console.log('Version mealplanner: ' + vis.binds['mealplanner'].version);
                delete vis.binds['mealplanner'].version;
            }
        },
        createWidget: function(widgetID, view, data, style) {
            console.log('[mp] createWidget: ' + widgetID);
            var $div = $('#' + widgetID);
            if (!$div.length) {
                setTimeout(function() {
                    vis.binds['mealplanner'].createWidget(widgetID, view, data, style);
                }, 200);
                return;
            }
            $div.css({ padding: '16px', fontFamily: 'sans-serif', fontSize: '18px' });
            $div.text('Lade...');
            vis.conn.getStates(['mealplanner.0.today.category'], function(err, states) {
                console.log('[mp] getStates err=' + err + ' states=' + JSON.stringify(states));
                var val = (states && states['mealplanner.0.today.category'])
                    ? String(states['mealplanner.0.today.category'].val || '—')
                    : '(kein Wert)';
                $div.text('Kategorie: ' + val);
            });
        },
        destroy: function(widgetID) {
            $('#' + widgetID).off();
        }
    };

    vis.binds['mealplanner'].showVersion();

}(jQuery));
</script>

<style>
/* mealplanner minimal */
</style>

<script id="tplMealplanner2Week" type="text/ejs" class="vis-tpl"

<% var _w=this.data.attr('wid'); setTimeout(function(){ vis.binds['mealplanner'].createWidget(_w,null,null,null); },100); %>
</script>
