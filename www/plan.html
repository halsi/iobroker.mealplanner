<!DOCTYPE html>
<html lang="de">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Essensplan</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="mp-app">
    <header id="mp-header">
        <div id="mp-kw-label"></div>
        <div id="mp-date-range"></div>
        <button id="mp-save-btn" class="mp-save-btn" onclick="savePlanExplicit()" style="display:none">Speichern</button>
    </header>
    <table id="mp-table">
        <thead>
            <tr>
                <th class="col-day">Tag</th>
                <th class="col-cat">Kategorie</th>
                <th class="col-main">Gericht</th>
                <th class="col-side">Beilage</th>
            </tr>
        </thead>
        <tbody id="mp-tbody">
            <tr><td colspan="4" class="mp-loading">Lade…</td></tr>
        </tbody>
    </table>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
