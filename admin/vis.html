<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Essensplaner</title>
    <link rel="stylesheet" href="vis.css">
    <style>
        .mp-col-cat { width: 90px; padding: 0 10px; font-size: 12px; color: var(--mp-day-fg); white-space: nowrap; text-transform: capitalize; }
        .mp-col-rand { width: 44px; text-align: center; padding: 0 4px; }
        .mp-col-main, .mp-col-side { cursor: pointer; padding: 0 12px; }
        .mp-cell-name { display: block; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mp-btn-rand { width: 36px; height: 36px; border: none; border-radius: 50%; background: var(--mp-btn-rand-bg); color: #555; font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.15s; }
        .mp-btn-rand:hover { background: var(--mp-btn-rand-hover); transform: rotate(180deg); }
    </style>
</head>
<body>

<div id="mp-vis">

    <div class="mp-week-block" id="mp-block-current">
        <div class="mp-week-header" id="mp-kw-current">KW — · Diese Woche</div>
        <table class="mp-vis-table" id="mp-tbl-current"></table>
    </div>

    <div class="mp-week-block" id="mp-block-next">
        <div class="mp-week-header" id="mp-kw-next">KW — · Nächste Woche</div>
        <table class="mp-vis-table" id="mp-tbl-next"></table>
    </div>

</div>

<!-- ── Picker Modal ─────────────────────────────────────────────────────────── -->
<div id="mp-picker-overlay" class="mp-picker-overlay" onclick="mpClosePicker(event)">
    <div class="mp-picker">
        <div class="mp-picker-head">
            <input type="search" id="mp-picker-search" placeholder="Suchen…" oninput="mpFilterPicker(this.value)">
            <button class="mp-picker-close" onclick="mpClosePicker()">✕</button>
        </div>
        <div id="mp-picker-list" class="mp-picker-list"></div>
    </div>
</div>

<script src="../../lib/js/socket.io.js"></script>
<script src="vis.js"></script>

</body>
</html>
